<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: pink;
            color: rgb(255, 255, 255);
            text-shadow: 1px 2px 3px black;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 4em;
            padding-top: 30%;
            text-align: center;
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt('Qual é seu nome?')
        document.write(`Seu nome possui ${nome.length} letras <br/>`)
        document.write(`Seu nome minusculas é ${nome.toUpperCase()} <br/>`)
        document.write(`Seu nome minusculas é ${nome.toLowerCase()} <br/>`)
    </script>
</body>
</html>
